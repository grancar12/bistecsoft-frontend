<div class="d-flex">

  <!-- Sidebar -->
  <nav class="sidebar d-flex flex-column">
    <div class="sidebar-brand">
      <i class="bi bi-grid-fill me-2" style="color: #90caf9"></i>
      <h5>Bistecsoft</h5>
    </div>

    <ul class="nav flex-column mt-2 flex-grow-1">
      <li class="nav-item">
        <a routerLink="/dashboard" routerLinkActive="active" class="nav-link">
          <i class="bi bi-speedometer2"></i> Dashboard
        </a>
      </li>
      <li class="nav-item">
        <a routerLink="/clientes" routerLinkActive="active" class="nav-link">
          <i class="bi bi-people"></i> Clientes
        </a>
      </li>
      <li class="nav-item">
        <a routerLink="/productos" routerLinkActive="active" class="nav-link">
          <i class="bi bi-box-seam"></i> Productos
        </a>
      </li>
      <li class="nav-item">
        <a routerLink="/ventas" routerLinkActive="active" class="nav-link">
          <i class="bi bi-receipt"></i> Ventas
        </a>
      </li>
    </ul>

    <div class="p-3 border-top" style="border-color: rgba(255,255,255,0.1) !important">
      <div class="d-flex align-items-center gap-2 mb-3">
        <div class="rounded-circle bg-primary d-flex align-items-center justify-content-center"
          style="width:36px; height:36px; min-width:36px">
          <i class="bi bi-person-fill text-white small"></i>
        </div>
        <div class="overflow-hidden">
          <p class="text-white mb-0 small fw-semibold text-truncate">{{ user?.name }}</p>
          <p class="mb-0 text-truncate" style="color: rgba(255,255,255,0.5); font-size: 0.75rem">
            {{ user?.email }}
          </p>
        </div>
      </div>
      <button (click)="logout()" class="btn btn-sm w-100"
        style="background: rgba(255,255,255,0.1); color: rgba(255,255,255,0.75); border: none">
        <i class="bi bi-box-arrow-right me-2"></i>Cerrar sesión
      </button>
    </div>
  </nav>

  <!-- Main content -->
  <div class="main-content w-100">
    <div class="page-content">
      <router-outlet></router-outlet>
    </div>
  </div>

</div>
