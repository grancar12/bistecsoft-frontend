<!-- src/app/shared/components/sidebar/sidebar.html -->
<nav class="sidebar d-flex flex-column">

  <!-- Brand -->
  <div class="sidebar-brand">
    <img src="imagenes/logo-elsazon.png" alt="El Sazón">
    <span class="brand-subtitle">Sistema de gestión</span>
  </div>

  <!-- Nav -->
  <ul class="nav flex-column mt-1 flex-grow-1">

    <li class="nav-section"><span>Principal</span></li>

    <li class="nav-item">
      <a routerLink="/dashboard" routerLinkActive="active" class="nav-link">
        <i class="bi bi-speedometer2"></i> Dashboard
      </a>
    </li>

    <li class="nav-section"><span>Gestión</span></li>

    <li class="nav-item">
      <a routerLink="/clientes" routerLinkActive="active" class="nav-link">
        <i class="bi bi-people"></i> Clientes
      </a>
    </li>
    <li class="nav-item">
      <a routerLink="/productos" routerLinkActive="active" class="nav-link">
        <i class="bi bi-box-seam"></i> Productos
      </a>
    </li>
    <li class="nav-item">
      <a routerLink="/ventas" routerLinkActive="active" class="nav-link">
        <i class="bi bi-receipt"></i> Ventas
      </a>
    </li>
    <li class="nav-item">
      <a routerLink="/ingresos" routerLinkActive="active" class="nav-link">
        <i class="bi bi-graph-up-arrow"></i> Ingresos
      </a>
    </li>

  </ul>

  <!-- Footer usuario -->
  <div class="sidebar-footer">
    <div class="sidebar-user">
      <div class="user-avatar">
        <i class="bi bi-person-fill"></i>
      </div>
      <div class="user-info">
        <p class="user-name">{{ user?.name }}</p>
        <p class="user-email">{{ user?.email }}</p>
      </div>
    </div>
    <button class="btn-logout" (click)="logout()">
      <i class="bi bi-box-arrow-right"></i>Cerrar sesión
    </button>
  </div>

</nav>
