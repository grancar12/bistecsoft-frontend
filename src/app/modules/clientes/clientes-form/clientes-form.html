<div class="d-flex justify-content-between align-items-center mb-4">
  <div>
    <h5 class="fw-bold mb-1">{{ esEdicion ? 'Editar cliente' : 'Nuevo cliente' }}</h5>
    <p class="text-muted small mb-0">{{ esEdicion ? 'Actualiza los datos del cliente' : 'Completa el formulario para registrar un cliente' }}</p>
  </div>
  <a routerLink="/clientes" class="btn btn-outline-secondary btn-sm">
    <i class="bi bi-arrow-left me-1"></i>Volver
  </a>
</div>

<div class="card" style="max-width: 560px">
  <div class="card-body p-4">

    <div *ngIf="error" class="alert alert-danger py-2 small">
      <i class="bi bi-exclamation-circle me-2"></i>{{ error }}
    </div>

    <form [formGroup]="form" (ngSubmit)="submit()">
      <div class="mb-3">
        <label class="form-label fw-semibold">Nombre <span class="text-danger">*</span></label>
        <input type="text" formControlName="nombre" class="form-control"
          [class.is-invalid]="form.get('nombre')?.invalid && form.get('nombre')?.touched"
          placeholder="Nombre completo">
        <div class="invalid-feedback">El nombre es requerido</div>
      </div>

      <div class="mb-3">
        <label class="form-label fw-semibold">Email <span class="text-danger">*</span></label>
        <input type="email" formControlName="email" class="form-control"
          [class.is-invalid]="form.get('email')?.invalid && form.get('email')?.touched"
          placeholder="correo@ejemplo.com">
        <div class="invalid-feedback">Ingresa un email válido</div>
      </div>

      <div class="mb-4">
        <label class="form-label fw-semibold">Teléfono</label>
        <input type="text" formControlName="telefono" class="form-control"
          placeholder="Número de teléfono">
      </div>

      <div class="d-flex gap-2">
        <button type="submit" class="btn btn-primary px-4" [disabled]="loading">
          <span *ngIf="loading" class="spinner-border spinner-border-sm me-2"></span>
          {{ loading ? 'Guardando...' : (esEdicion ? 'Actualizar' : 'Guardar') }}
        </button>
        <a routerLink="/clientes" class="btn btn-outline-secondary px-4">Cancelar</a>
      </div>
    </form>

  </div>
</div>
