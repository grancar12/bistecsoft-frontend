<div class="d-flex justify-content-between align-items-center mb-4">
  <div>
    <h5 class="fw-bold mb-1">Clientes</h5>
    <p class="text-muted small mb-0">Gestión de clientes del restaurante</p>
  </div>
  <a routerLink="/clientes/nuevo" class="btn btn-primary">
    <i class="bi bi-plus-lg me-2"></i>Nuevo cliente
  </a>
</div>

<div *ngIf="error" class="alert alert-danger">{{ error }}</div>

<div class="card">
  <div class="card-body p-0">
    <div *ngIf="loading" class="text-center py-5">
      <div class="spinner-border text-primary"></div>
    </div>

    <div *ngIf="!loading && clientes.length === 0" class="text-center py-5 text-muted">
      <i class="bi bi-people fs-1 d-block mb-2"></i>
      No hay clientes registrados aún.
    </div>

    <table *ngIf="!loading && clientes.length > 0" class="table table-hover mb-0">
      <thead class="table-light">
        <tr>
          <th>#</th>
          <th>Nombre</th>
          <th>Email</th>
          <th>Teléfono</th>
          <th class="text-end">Acciones</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let cliente of clientes">
          <td class="text-muted small">{{ cliente.id }}</td>
          <td class="fw-semibold">{{ cliente.nombre }}</td>
          <td>{{ cliente.email }}</td>
          <td>{{ cliente.telefono || '—' }}</td>
          <td class="text-end">
            <a [routerLink]="['/clientes/editar', cliente.id]"
              class="btn btn-sm btn-outline-primary me-1">
              <i class="bi bi-pencil"></i>
            </a>
            <button class="btn btn-sm btn-outline-danger"
              (click)="eliminar(cliente.id)"
              [disabled]="eliminando === cliente.id">
              <span *ngIf="eliminando === cliente.id"
                class="spinner-border spinner-border-sm"></span>
              <i *ngIf="eliminando !== cliente.id" class="bi bi-trash"></i>
            </button>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
