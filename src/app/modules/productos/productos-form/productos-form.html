<div class="d-flex justify-content-between align-items-center mb-4">
  <div>
    <h5 class="fw-bold mb-1">{{ esEdicion ? 'Editar producto' : 'Nuevo producto' }}</h5>
    <p class="text-muted small mb-0">{{ esEdicion ? 'Actualiza los datos del producto' : 'Completa el formulario para registrar un producto' }}</p>
  </div>
  <a routerLink="/productos" class="btn btn-outline-secondary btn-sm">
    <i class="bi bi-arrow-left me-1"></i>Volver
  </a>
</div>

<div class="card" style="max-width: 560px">
  <div class="card-body p-4">

    <div *ngIf="error" class="alert alert-danger py-2 small">
      <i class="bi bi-exclamation-circle me-2"></i>{{ error }}
    </div>

    <form [formGroup]="form" (ngSubmit)="submit()">
      <div class="mb-3">
        <label class="form-label fw-semibold">Nombre <span class="text-danger">*</span></label>
        <input type="text" formControlName="nombre" class="form-control"
          [class.is-invalid]="form.get('nombre')?.invalid && form.get('nombre')?.touched"
          placeholder="Nombre del producto">
        <div class="invalid-feedback">El nombre es requerido</div>
      </div>

      <div class="mb-3">
        <label class="form-label fw-semibold">Descripción</label>
        <textarea formControlName="descripcion" class="form-control" rows="3"
          placeholder="Descripción del producto"></textarea>
      </div>

      <div class="row g-3 mb-4">
        <div class="col-6">
          <label class="form-label fw-semibold">Precio <span class="text-danger">*</span></label>
          <div class="input-group">
            <span class="input-group-text">$</span>
            <input type="number" formControlName="precio" class="form-control"
              [class.is-invalid]="form.get('precio')?.invalid && form.get('precio')?.touched"
              placeholder="0">
          </div>
          <div class="invalid-feedback">Ingresa un precio válido</div>
        </div>
        <div class="col-6">
          <label class="form-label fw-semibold">Stock <span class="text-danger">*</span></label>
          <input type="number" formControlName="stock" class="form-control"
            [class.is-invalid]="form.get('stock')?.invalid && form.get('stock')?.touched"
            placeholder="0">
          <div class="invalid-feedback">Ingresa el stock disponible</div>
        </div>
      </div>

      <div class="d-flex gap-2">
        <button type="submit" class="btn btn-primary px-4" [disabled]="loading">
          <span *ngIf="loading" class="spinner-border spinner-border-sm me-2"></span>
          {{ loading ? 'Guardando...' : (esEdicion ? 'Actualizar' : 'Guardar') }}
        </button>
        <a routerLink="/productos" class="btn btn-outline-secondary px-4">Cancelar</a>
      </div>
    </form>

  </div>
</div>
